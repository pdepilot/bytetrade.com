<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Finvest</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --primary: #302b63;
      --dark: #121212;
      --card-bg: #1e1e1e;
      --text: #fff;
      --gray: #aaa;
      --danger: #f44336;
      --success: #4caf50;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--dark);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px 0;
    }

    .header h1 {
      font-size: 2rem;
      color: var(--primary);
    }

    .card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--gray);
    }

    input {
      width: 100%;
      padding: 12px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      background: var(--primary);
      color: var(--dark);
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.3s;
    }

    .btn:hover {
      background: rgb(8, 0, 255);
      color: white;
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin: 20px 0;
    }

    .alert-success {
      background: rgba(76, 175, 80, 0.2);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .alert-error {
      background: rgba(244, 67, 54, 0.2);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    @media (max-width: 600px) {
      .card {
        padding: 20px;
      }
      .header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-user-shield"></i> Admin Dashboard</h1>
      <p>Fund user wallets securely</p>
    </div>

    <!-- <?php if ($message): ?>

    <?php endif; ?>

    <?php endif; ?> -->

    <div class="card">
      <h2 style="margin-bottom: 20px; color: var(--text);">
        <i class="fas fa-wallet"></i> Fund User Wallet
      </h2>
      <form method="POST">
        <div class="form-group">
          <label for="user_id">User ID (optional if email provided)</label>
          <input type="number" id="user_id" name="user_id" placeholder="12345">
        </div>

        <div class="form-group">
          <label for="email">User Email *</label>
          <input type="email" id="email" name="email" placeholder="user@example.com">
        </div>

        <div class="form-group">
          <label for="wallet">Wallet Address *</label>
          <input type="text" id="wallet" name="wallet" placeholder="TJHkqVX..." required>
        </div>

        <div class="form-group">
          <label for="amount">Amount (USDT) *</label>
          <input type="number" step="0.01" id="amount" name="amount" placeholder="100.00" required>
        </div>

        <button type="submit" class="btn">
          <i class="fas fa-paper-plane"></i> Fund Wallet
        </button>
      </form>
    </div>
  </div>
</body>
</html>
