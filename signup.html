<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — MintMythic</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* =============== GLOBAL =============== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1e00ff;
      --dark: #000;
      --darker: #0a0a0a;
      --card-bg: #111;
      --text: #fff;
      --gray: #aaa;
      --success: #4caf50;
      --danger: #f44336;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
    }

    /* =============== HEADER =============== */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(to right, var(--text), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .header p {
      color: var(--gray);
      font-size: 1.1rem;
    }

    /* =============== CARD =============== */
    .card {
      background: var(--card-bg);
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .form-title {
      font-size: 1.8rem;
      margin-bottom: 25px;
      text-align: center;
      color: var(--text);
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--gray);
      font-size: 0.95rem;
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 42px;
      color: var(--gray);
      cursor: pointer;
      background: none;
      border: none;
      font-size: 1rem;
      transition: 0.3s;
    }

    .password-strength {
      height: 4px;
      background: #444;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .strength-meter {
      height: 100%;
      width: 0;
      background: var(--danger);
      transition: width 0.3s, background 0.3s;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: var(--text);
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px var(--gray);
    }

    .divider {
      text-align: center;
      margin: 25px 0;
      position: relative;
      color: var(--gray);
      font-size: 0.9rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #444;
    }

    .divider::before {
      left: 0;
      width: 160px;
    }

    .divider::after {
      right: 0;
      width: 160px;
    }

    .social-login {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }

    .social-btn {
      flex: 1;
      padding: 12px;
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .social-btn:hover {
      background: #333;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      color: var(--gray);
    }

    .login-link a {
      color: var(--primary);
      font-weight: bold;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .error {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 5px;
      display: none;
    }

    /* =============== RESPONSIVE =============== */
    @media (max-width: 600px) {
      body {
        padding: 20px 15px;
      }

      .card {
        padding: 30px 20px;
      }

      .form-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">BITBAY</div>
      <p>Create your secure crypto wallet account</p>
    </div>

    <!-- Sign Up Card -->
    <div class="card">
      <h2 class="form-title">Create Account</h2>

      <form id="signupForm">
        <!-- Full Name -->
        <div class="input-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="Enter your full name" required />
          <div class="error" id="name-error">Please enter a valid name</div>
        </div>

        <!-- Email -->
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
          <div class="error" id="email-error">Please enter a valid email</div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label for="password">Password</label>
          <div style="position: relative;">
            <input type="password" id="password" placeholder="Create a strong password" required />
            <button type="button" class="toggle-password" id="togglePassword">
              <!-- <i class="fas fa-eye"></i> -->
            </button>
          </div>
          <!-- <div class="password-strength">
            <div class="strength-meter" id="strengthMeter"></div>
          </div> -->
          <div class="error" id="password-error">Password must be at least 8 characters</div>
        </div>

        <!-- Confirm Password -->
        <div class="input-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter your password" required />
          <div class="error" id="confirm-error">Passwords do not match</div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn">Create Account</button>
      </form>

      <!-- OR Divider -->
      <div class="divider">or continue with</div>

      <!-- Social Login -->
      <div class="social-login">
        <div class="social-btn">
          <i class="fab fa-google"></i> Google
        </div>
        <div class="social-btn">
          <i class="fab fa-discord"></i> Discord
        </div>
      </div>

      <!-- Login Link -->
      <div class="login-link">
        Already have an account? <a href="/login.html">Log In</a>
      </div>
    </div>
  </div>

  <script>
    // =============== PASSWORD TOGGLE ===============
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      togglePassword.innerHTML = type === 'password' 
        ? '<i class="fas fa-eye"></i>' 
        : '<i class="fas fa-eye-slash"></i>';
    });

    // =============== PASSWORD STRENGTH ===============
    const strengthMeter = document.getElementById('strengthMeter');
    const password = document.getElementById('password');

    password.addEventListener('input', () => {
      const value = password.value;
      let strength = 0;

      if (value.length >= 8) strength += 25;
      if (/[A-Z]/.test(value)) strength += 25;
      if (/[0-9]/.test(value)) strength += 25;
      if (/[^A-Za-z0-9]/.test(value)) strength += 25;

      strengthMeter.style.width = strength + '%';
      
      // Color based on strength
      if (strength < 25) {
        strengthMeter.style.background = 'var(--danger)';
      } else if (strength < 75) {
        strengthMeter.style.background = '#ff9800';
      } else {
        strengthMeter.style.background = 'var(--success)';
      }
    });

    // =============== FORM VALIDATION ===============
    const signupForm = document.getElementById('signupForm');
    const confirmPassword = document.getElementById('confirmPassword');

    signupForm.addEventListener('submit', function(e) {
      e.preventDefault();
      let isValid = true;

      // Reset errors
      document.querySelectorAll('.error').forEach(el => el.style.display = 'none');

      // Name validation
      const name = document.getElementById('fullname').value.trim();
      if (name.length < 2) {
        document.getElementById('name-error').style.display = 'block';
        isValid = false;
      }

      // Email validation
      const email = document.getElementById('email').value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        document.getElementById('email-error').style.display = 'block';
        isValid = false;
      }

      // Password validation
      if (password.value.length < 8) {
        document.getElementById('password-error').style.display = 'block';
        isValid = false;
      }

      // Confirm password
      if (password.value !== confirmPassword.value) {
        document.getElementById('confirm-error').style.display = 'block';
        isValid = false;
      }

      if (isValid) {
        // In real app: send to backend
        alert('✅ Account created successfully!\nYou will receive a confirmation email shortly.');
        signupForm.reset();
        strengthMeter.style.width = '0';
      }
    });

    // =============== REAL-TIME CONFIRM VALIDATION ===============
    confirmPassword.addEventListener('input', () => {
      if (confirmPassword.value && password.value !== confirmPassword.value) {
        document.getElementById('confirm-error').style.display = 'block';
      } else {
        document.getElementById('confirm-error').style.display = 'none';
      }
    });
  </script>
</body>
</html>
