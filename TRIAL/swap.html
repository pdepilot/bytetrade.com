<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./fontawesome-free-6.4.0-web/css/all.min.css">
    <title>Document</title>
</head>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #302b63;
        color: var(--text);
        line-height: 1.6;
        padding: 20px 30px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

        .back-arrow {
            position: absolute;
            top: 0px;
            left: 20px;
        }
        .back-arrow a {
            color: white;
            text-decoration: none;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 5px;
            padding-top: 30px;
            padding-left: 50px;
        }

    .form-container {
        background-color: white;
        padding: 30px;
        border-radius: 16px;
        width: 80%;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
    }

    .form-input, .form-select {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid black;
        background: var(--dark);
        color: var(--text);
    }

    .form-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
    }

    .btn-primary {
        background-color: #302b63;
        color: white;
    }

    .btn-secondary {
        background-color: #444;
        color: white;
    }

    
</style>

<body>
    
    <div class="back-arrow">
        <a href="./dashbord1.html"><i class="fas fa-arrow-left"></i></a>
    </div>
    
    <div class="form-container" id="swap-form">
            <h2 class="section-title"><i class="fas fa-sync-alt"></i> Swap Crypto</h2>
            <div class="form-group">
                <label class="form-label">From</label>
                <select class="form-select">
                    <option value="bnb">BNB</option>
                    <option value="eth">ETH</option>
                    <option value="btc">BTC</option>
                    <option value="usdt">USDT</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Amount</label>
                <input type="number" class="form-input" placeholder="Enter amount">
            </div>
            <div class="form-group">
                <label class="form-label">To</label>
                <select class="form-select">
                    <option value="eth">ETH</option>
                    <option value="bnb">BNB</option>
                    <option value="btc">BTC</option>
                    <option value="usdt">USDT</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Exchange Rate</label>
                <div class="form-input" style="background-color: var(--light-gray);">
                    1 BNB = 0.058 ETH
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Estimated Received</label>
                <div class="form-input" style="background-color: var(--light-gray);">
                    0.000000 ETH
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Slippage Tolerance</label>
                <select class="form-select">
                    <option value="0.5">0.5%</option>
                    <option value="1" selected>1%</option>
                    <option value="2">2%</option>
                    <option value="3">3%</option>
                </select>
            </div>
            <div class="form-footer">
                <button class="btn btn-secondary" id="cancel-swap">Cancel</button>
                <button class="btn btn-primary" id="confirm-swap">Swap Now</button>
            </div>
        </div>


</body>
</html>
